naftiko: 1.0.0-alpha2
info:
  label: Temporal Cloud Operations API — Regions
  description: 'Temporal Cloud Operations API — Regions. 1 operations. Lead operation: List Regions. Self-contained Naftiko
    capability covering one Temporal business surface.'
  tags:
  - Temporal
  - Regions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEMPORAL_API_KEY: TEMPORAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-ops-regions
    baseUri: https://saas-api.tmprl.cloud
    description: Temporal Cloud Operations API — Regions business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-regions
      path: /api/v1/regions
      operations:
      - name: listregions
        method: GET
        description: List Regions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TEMPORAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-ops-regions-rest
    port: 8080
    description: REST adapter for Temporal Cloud Operations API — Regions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/regions
      name: api-v1-regions
      description: REST surface for api-v1-regions.
      operations:
      - method: GET
        name: listregions
        description: List Regions
        call: cloud-ops-regions.listregions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-ops-regions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Temporal Cloud Operations API — Regions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-regions
      description: List Regions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-ops-regions.listregions
      outputParameters:
      - type: object
        mapping: $.
