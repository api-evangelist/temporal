naftiko: "1.0.0-alpha1"

info:
  label: "Temporal Cloud Operations"
  description: "Unified workflow for platform administrators to manage Temporal Cloud infrastructure including namespaces, users, service accounts, API keys, and regions."
  tags:
    - Temporal
    - Cloud Operations
    - Platform Administration
    - Workflow Infrastructure
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      TEMPORAL_API_KEY: TEMPORAL_API_KEY

capability:
  consumes:
    - import: cloud-ops
      location: ./shared/cloud-ops.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: cloud-operations-api
      description: "Unified REST API for Temporal Cloud operations management."
      resources:
        - path: /v1/namespaces
          name: namespaces
          description: "Namespace management"
          operations:
            - method: GET
              name: list-namespaces
              description: "List all namespaces"
              call: "cloud-ops.list-namespaces"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-namespace
              description: "Create a namespace"
              call: "cloud-ops.create-namespace"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/namespaces/{namespace}
          name: namespace-detail
          description: "Single namespace operations"
          operations:
            - method: GET
              name: get-namespace
              description: "Get namespace details"
              call: "cloud-ops.get-namespace"
              with:
                namespace: "rest.namespace"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-namespace
              description: "Delete a namespace"
              call: "cloud-ops.delete-namespace"
              with:
                namespace: "rest.namespace"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          description: "User management"
          operations:
            - method: GET
              name: list-users
              description: "List all users"
              call: "cloud-ops.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: "Create a user"
              call: "cloud-ops.create-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-accounts
          name: service-accounts
          description: "Service account management"
          operations:
            - method: GET
              name: list-service-accounts
              description: "List all service accounts"
              call: "cloud-ops.list-service-accounts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-service-account
              description: "Create a service account"
              call: "cloud-ops.create-service-account"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/api-keys
          name: api-keys
          description: "API key management"
          operations:
            - method: GET
              name: list-api-keys
              description: "List all API keys"
              call: "cloud-ops.list-api-keys"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-api-key
              description: "Create an API key"
              call: "cloud-ops.create-api-key"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/regions
          name: regions
          description: "Region information"
          operations:
            - method: GET
              name: list-regions
              description: "List available regions"
              call: "cloud-ops.list-regions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: cloud-operations-mcp
      transport: http
      description: "MCP server for AI-assisted Temporal Cloud operations management."
      tools:
        - name: list-namespaces
          description: "List all Temporal Cloud namespaces"
          hints:
            readOnly: true
            openWorld: true
          call: "cloud-ops.list-namespaces"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-namespace
          description: "Create a new Temporal Cloud namespace"
          hints:
            readOnly: false
          call: "cloud-ops.create-namespace"
          with:
            spec: "tools.spec"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-namespace
          description: "Get details for a specific namespace"
          hints:
            readOnly: true
          call: "cloud-ops.get-namespace"
          with:
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-namespace
          description: "Update namespace configuration"
          hints:
            readOnly: false
            idempotent: true
          call: "cloud-ops.update-namespace"
          with:
            namespace: "tools.namespace"
            resourceVersion: "tools.resourceVersion"
            spec: "tools.spec"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-namespace
          description: "Delete a Temporal Cloud namespace"
          hints:
            destructive: true
          call: "cloud-ops.delete-namespace"
          with:
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List all users in the account"
          hints:
            readOnly: true
          call: "cloud-ops.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: "Create a new user"
          hints:
            readOnly: false
          call: "cloud-ops.create-user"
          with:
            spec: "tools.spec"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user
          description: "Get user details"
          hints:
            readOnly: true
          call: "cloud-ops.get-user"
          with:
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-user
          description: "Delete a user"
          hints:
            destructive: true
          call: "cloud-ops.delete-user"
          with:
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-accounts
          description: "List all service accounts"
          hints:
            readOnly: true
          call: "cloud-ops.list-service-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-service-account
          description: "Create a service account for API access"
          hints:
            readOnly: false
          call: "cloud-ops.create-service-account"
          with:
            spec: "tools.spec"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-service-account
          description: "Get service account details"
          hints:
            readOnly: true
          call: "cloud-ops.get-service-account"
          with:
            serviceAccountId: "tools.serviceAccountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-service-account
          description: "Delete a service account"
          hints:
            destructive: true
          call: "cloud-ops.delete-service-account"
          with:
            serviceAccountId: "tools.serviceAccountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-api-keys
          description: "List all API keys in the account"
          hints:
            readOnly: true
          call: "cloud-ops.list-api-keys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-api-key
          description: "Create a new API key for authentication"
          hints:
            readOnly: false
          call: "cloud-ops.create-api-key"
          with:
            spec: "tools.spec"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-api-key
          description: "Get API key details"
          hints:
            readOnly: true
          call: "cloud-ops.get-api-key"
          with:
            keyId: "tools.keyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-api-key
          description: "Delete an API key"
          hints:
            destructive: true
          call: "cloud-ops.delete-api-key"
          with:
            keyId: "tools.keyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-regions
          description: "List all available Temporal Cloud regions"
          hints:
            readOnly: true
          call: "cloud-ops.list-regions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-async-operation
          description: "Check the status of an asynchronous operation"
          hints:
            readOnly: true
          call: "cloud-ops.get-async-operation"
          with:
            asyncOperationId: "tools.asyncOperationId"
          outputParameters:
            - type: object
              mapping: "$."
