overlay: 1.0.0
info:
  title: API Evangelist enhancements for Temporal Cloud Operations API
  version: 1.0.0
extends: openapi/cloud-ops-api.yml
actions:
  - target: $.info
    update:
      x-apievangelist-provider: temporal
      x-apievangelist-api: cloud-ops-api
      x-apievangelist-artifacts:
        authentication: authentication/temporal-authentication.yml
        conventions: conventions/temporal-conventions.yml
        errors: errors/temporal-error-codes.yml
        lifecycle: lifecycle/temporal-lifecycle.yml
        data-model: data-model/temporal-data-model.yml
        grpc: grpc/temporal-cloudservice.proto
  - target: $.info
    update:
      x-apievangelist-transport: grpc-gateway
      x-apievangelist-source-proto: https://github.com/temporalio/cloud-api
      description: >-
        The Temporal Cloud Operations API programmatically manages Temporal
        Cloud control-plane resources (Namespaces, Users, Service Accounts, API
        Keys, Regions). It is an HTTP/JSON facade generated by grpc-gateway over
        the temporal.api.cloud.cloudservice.v1.CloudService gRPC service.
  - target: $.tags
    update:
      - name: Namespaces
        description: Create, read, update, and delete Temporal Cloud Namespaces.
      - name: Users
        description: Manage account Users and their access.
      - name: Service Accounts
        description: Manage machine identities used for automation.
      - name: API Keys
        description: Issue and revoke API keys for Users and Service Accounts.
      - name: Regions
        description: Enumerate available cloud provider Regions.
      - name: Async Operations
        description: Track long-running control-plane operations to completion.
  - target: $.paths['/api/v1/namespaces'].get
    update:
      x-apievangelist-pagination:
        style: cursor
        request: {pageSize: query, pageToken: query}
        response: nextPageToken
