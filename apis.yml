apis:
  - aid: temporal:server-frontend-api
    name: Temporal Server Frontend API
    description: >-
      The Temporal Server Frontend API provides gRPC services for interacting
      with the Temporal Server, including WorkflowService for managing workflow
      executions, OperatorService for cluster operations, and HealthService for
      health checks. Client SDKs and the Temporal CLI use these gRPC services
      under the hood.
    humanURL: https://docs.temporal.io/self-hosted-guide/server-frontend-api-reference
    tags:
      - Workflows
      - gRPC
      - Durable Execution
    properties:
      - type: Documentation
        url: https://docs.temporal.io/self-hosted-guide/server-frontend-api-reference
      - type: GitHubRepository
        url: https://github.com/temporalio/api
  - aid: temporal:cloud-ops-api
    name: Temporal Cloud Ops API
    description: >-
      The Temporal Cloud Operations API is an open source, public HTTP API and
      gRPC API for programmatically managing Temporal Cloud control plane
      resources, including Namespaces, Users, Service Accounts, API keys, and
      other infrastructure components.
    humanURL: https://docs.temporal.io/ops
    tags:
      - Cloud
      - Operations
      - Workflows
    properties:
      - type: Documentation
        url: https://docs.temporal.io/ops
      - type: APIReference
        url: https://saas-api.tmprl.cloud/docs/httpapi.html
      - type: GitHubRepository
        url: https://github.com/temporalio/cloud-api
